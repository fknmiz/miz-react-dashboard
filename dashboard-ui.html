<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Miz React Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300..700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root,[data-theme="light"]{
  --bg:#f7f6f2;--surface:#ffffff;--surface2:#f3f0ec;--border:#dcd9d5;
  --text:#28251d;--muted:#7a7974;--faint:#bab9b4;
  --primary:#01696f;--primary-hover:#0c4e54;--primary-glow:rgba(1,105,111,0.15);
  --success:#437a22;--warning:#da7101;--error:#a12c7b;--info:#006494;
  --shadow:0 1px 3px rgba(0,0,0,.08),0 4px 16px rgba(0,0,0,.05);
  --shadow-lg:0 8px 32px rgba(0,0,0,.1);--radius:0.75rem;--transition:180ms cubic-bezier(0.16,1,0.3,1);
}
[data-theme="dark"]{
  --bg:#0f0f11;--surface:#16161a;--surface2:#1c1c22;--border:#2a2a33;
  --text:#e8e8f0;--muted:#888896;--faint:#44444e;
  --primary:#4f98a3;--primary-hover:#60b0bc;--primary-glow:rgba(79,152,163,0.15);
  --success:#6daa45;--warning:#fdab43;--error:#d163a7;--info:#5591c7;
  --shadow:0 1px 3px rgba(0,0,0,.4),0 4px 16px rgba(0,0,0,.3);
  --shadow-lg:0 8px 32px rgba(0,0,0,.5);
}
html{-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;scroll-behavior:smooth}
body{font-family:'Inter',sans-serif;font-size:1rem;color:var(--text);background:var(--bg);min-height:100dvh;line-height:1.6}
button{cursor:pointer;background:none;border:none;font:inherit;color:inherit}
img,svg{display:block;max-width:100%}
.app{display:grid;grid-template-columns:240px 1fr;grid-template-rows:auto 1fr;min-height:100dvh}
@media(max-width:768px){.app{grid-template-columns:1fr}}
.sidebar{grid-row:1/-1;background:var(--surface);border-right:1px solid var(--border);padding:1.5rem 1rem;display:flex;flex-direction:column;gap:0.5rem;position:sticky;top:0;height:100dvh;overflow-y:auto}
@media(max-width:768px){.sidebar{display:none}}
.sidebar-logo{display:flex;align-items:center;gap:0.75rem;padding:0.5rem 0.75rem;margin-bottom:1rem}
.logo-mark{width:32px;height:32px;flex-shrink:0}
.logo-text{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:1.1rem;letter-spacing:-0.02em}
.logo-text span{color:var(--primary)}
.nav-section{font-size:0.7rem;font-weight:600;text-transform:uppercase;letter-spacing:0.08em;color:var(--faint);padding:0.75rem 0.75rem 0.25rem;margin-top:0.5rem}
.nav-item{display:flex;align-items:center;gap:0.75rem;padding:0.6rem 0.75rem;border-radius:0.5rem;color:var(--muted);font-size:0.875rem;font-weight:500;cursor:pointer;transition:all var(--transition);user-select:none}
.nav-item:hover{background:var(--surface2);color:var(--text)}
.nav-item.active{background:var(--primary-glow);color:var(--primary);font-weight:600}
.nav-item svg{flex-shrink:0;opacity:0.8}
.nav-item.active svg{opacity:1}
.sidebar-bottom{margin-top:auto;padding-top:1rem;border-top:1px solid var(--border)}
.header{background:var(--surface);border-bottom:1px solid var(--border);padding:0 1.5rem;height:60px;display:flex;align-items:center;justify-content:space-between;gap:1rem;position:sticky;top:0;z-index:10}
.header-left{display:flex;align-items:center;gap:1rem}
.mobile-logo{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:1rem;display:none;align-items:center;gap:0.5rem}
@media(max-width:768px){.mobile-logo{display:flex}}
.search-bar{display:flex;align-items:center;gap:0.5rem;background:var(--surface2);border:1px solid var(--border);border-radius:0.5rem;padding:0.4rem 0.75rem;font-size:0.875rem;color:var(--muted);width:220px;transition:all var(--transition)}
.search-bar:focus-within{border-color:var(--primary);width:260px;color:var(--text)}
.search-bar input{background:none;border:none;outline:none;font:inherit;color:inherit;width:100%}
.search-bar input::placeholder{color:var(--faint)}
@media(max-width:480px){.search-bar{width:160px}.search-bar:focus-within{width:180px}}
.header-right{display:flex;align-items:center;gap:0.5rem}
.icon-btn{width:36px;height:36px;border-radius:0.5rem;display:flex;align-items:center;justify-content:center;color:var(--muted);transition:all var(--transition)}
.icon-btn:hover{background:var(--surface2);color:var(--text)}
.avatar{width:32px;height:32px;border-radius:50%;background:var(--primary);display:flex;align-items:center;justify-content:center;font-size:0.75rem;font-weight:700;color:#fff;font-family:'Space Grotesk',sans-serif;cursor:pointer;flex-shrink:0}
.badge{position:relative}
.badge::after{content:'';position:absolute;top:4px;right:4px;width:7px;height:7px;background:var(--error);border-radius:50%;border:1.5px solid var(--surface)}
.main{padding:1.5rem;display:flex;flex-direction:column;gap:1.5rem;min-width:0}
@media(max-width:480px){.main{padding:1rem;gap:1rem}}
.page-header{display:flex;align-items:flex-start;justify-content:space-between;gap:1rem;flex-wrap:wrap}
.page-title{font-family:'Space Grotesk',sans-serif;font-size:1.4rem;font-weight:700;letter-spacing:-0.02em}
.page-subtitle{font-size:0.85rem;color:var(--muted);margin-top:0.2rem}
.btn{display:inline-flex;align-items:center;gap:0.5rem;padding:0.5rem 1rem;border-radius:0.5rem;font-size:0.875rem;font-weight:600;transition:all var(--transition);cursor:pointer}
.btn-primary{background:var(--primary);color:#fff}
.btn-primary:hover{background:var(--primary-hover);box-shadow:0 4px 12px var(--primary-glow)}
.btn-ghost{border:1px solid var(--border);color:var(--muted)}
.btn-ghost:hover{border-color:var(--primary);color:var(--primary);background:var(--primary-glow)}
.date-tabs{display:flex;gap:0.25rem;background:var(--surface2);padding:0.25rem;border-radius:0.5rem;border:1px solid var(--border)}
.date-tab{padding:0.3rem 0.75rem;border-radius:0.375rem;font-size:0.8rem;font-weight:500;color:var(--muted);cursor:pointer;transition:all var(--transition)}
.date-tab.active{background:var(--surface);color:var(--text);box-shadow:var(--shadow)}
.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:1rem}
@media(max-width:1100px){.kpi-grid{grid-template-columns:repeat(2,1fr)}}
@media(max-width:480px){.kpi-grid{grid-template-columns:1fr}}
.kpi-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1.25rem;display:flex;flex-direction:column;gap:0.75rem;box-shadow:var(--shadow);transition:box-shadow var(--transition)}
.kpi-card:hover{box-shadow:var(--shadow-lg)}
.kpi-header{display:flex;align-items:center;justify-content:space-between}
.kpi-label{font-size:0.8rem;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:0.05em}
.kpi-icon{width:32px;height:32px;border-radius:0.5rem;display:flex;align-items:center;justify-content:center}
.kpi-value{font-family:'Space Grotesk',sans-serif;font-size:1.75rem;font-weight:700;letter-spacing:-0.03em;line-height:1}
.kpi-footer{display:flex;align-items:center;gap:0.4rem;font-size:0.78rem}
.trend{display:inline-flex;align-items:center;gap:0.2rem;font-weight:600;padding:0.15rem 0.4rem;border-radius:0.3rem}
.trend.up{color:var(--success);background:rgba(67,122,34,0.12)}
.trend.down{color:var(--error);background:rgba(161,44,123,0.12)}
[data-theme="dark"] .trend.up{background:rgba(109,170,69,0.15)}
[data-theme="dark"] .trend.down{background:rgba(209,99,167,0.15)}
.trend-label{color:var(--faint)}
.charts-grid{display:grid;grid-template-columns:2fr 1fr;gap:1rem}
@media(max-width:900px){.charts-grid{grid-template-columns:1fr}}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1.25rem;box-shadow:var(--shadow)}
.card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem}
.card-title{font-family:'Space Grotesk',sans-serif;font-size:0.95rem;font-weight:700}
.card-subtitle{font-size:0.78rem;color:var(--muted);margin-top:0.1rem}
.chart-wrap{position:relative;height:220px}
.donut-legend{display:flex;flex-direction:column;gap:0.65rem;margin-top:1rem}
.legend-item{display:flex;align-items:center;justify-content:space-between;font-size:0.82rem}
.legend-left{display:flex;align-items:center;gap:0.5rem;color:var(--muted)}
.legend-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.legend-val{font-weight:600;color:var(--text);font-family:'Space Grotesk',sans-serif}
.table-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:0.85rem}
thead th{text-align:left;padding:0.6rem 0.75rem;font-size:0.72rem;font-weight:600;text-transform:uppercase;letter-spacing:0.06em;color:var(--faint);border-bottom:1px solid var(--border);white-space:nowrap}
tbody tr{border-bottom:1px solid var(--border);transition:background var(--transition)}
tbody tr:hover{background:var(--surface2)}
tbody tr:last-child{border-bottom:none}
tbody td{padding:0.75rem;color:var(--text);vertical-align:middle}
.td-muted{color:var(--muted)}
.status-pill{display:inline-flex;align-items:center;gap:0.3rem;padding:0.2rem 0.6rem;border-radius:9999px;font-size:0.75rem;font-weight:600}
.pill-success{background:rgba(67,122,34,0.12);color:var(--success)}
.pill-warning{background:rgba(218,113,1,0.12);color:var(--warning)}
.pill-info{background:rgba(0,100,148,0.12);color:var(--info)}
[data-theme="dark"] .pill-success{background:rgba(109,170,69,0.15)}
[data-theme="dark"] .pill-warning{background:rgba(253,171,67,0.15)}
[data-theme="dark"] .pill-info{background:rgba(85,145,199,0.15)}
.user-cell{display:flex;align-items:center;gap:0.6rem}
.user-av{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:0.7rem;font-weight:700;color:#fff;flex-shrink:0}
.bottom-grid{display:grid;grid-template-columns:1fr 1fr;gap:1rem}
@media(max-width:768px){.bottom-grid{grid-template-columns:1fr}}
.activity-list{display:flex;flex-direction:column;gap:0}
.activity-item{display:flex;gap:0.75rem;padding:0.75rem 0;border-bottom:1px solid var(--border);align-items:flex-start}
.activity-item:last-child{border-bottom:none}
.activity-icon{width:32px;height:32px;border-radius:0.5rem;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:0.1rem}
.activity-body{flex:1;min-width:0}
.activity-text{font-size:0.84rem;line-height:1.4;color:var(--text)}
.activity-text strong{font-weight:600}
.activity-time{font-size:0.75rem;color:var(--faint);margin-top:0.15rem}
.top-pages{display:flex;flex-direction:column;gap:0.65rem}
.page-row{display:flex;align-items:center;gap:0.75rem;font-size:0.84rem}
.page-rank{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:0.75rem;color:var(--faint);width:16px;text-align:right;flex-shrink:0}
.page-info{flex:1;min-width:0}
.page-name{font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.page-url{font-size:0.73rem;color:var(--faint);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.page-bar-wrap{width:80px;flex-shrink:0}
.page-bar-bg{height:4px;background:var(--surface2);border-radius:9999px;overflow:hidden}
.page-bar-fill{height:100%;background:var(--primary);border-radius:9999px;transition:width 1s ease}
.page-visits{font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:0.8rem;color:var(--text);width:36px;text-align:right;flex-shrink:0}
.tooltip-wrap{position:relative;display:inline-flex}
.tooltip-wrap:hover .tooltip{opacity:1;transform:translateY(0)}
.tooltip{position:absolute;bottom:calc(100% + 6px);left:50%;transform:translateX(-50%) translateY(4px);background:var(--text);color:var(--bg);font-size:0.72rem;padding:0.3rem 0.5rem;border-radius:0.3rem;white-space:nowrap;pointer-events:none;opacity:0;transition:all 150ms ease;z-index:100}
:focus-visible{outline:2px solid var(--primary);outline-offset:3px;border-radius:4px}
::selection{background:rgba(79,152,163,0.25);color:var(--text)}
</style>
</head>

    revenue:  <svg viewBox="0 0 24 24" style={{...s,width:16,height:16}}><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>,
    conversion:<svg viewBox="0 0 24 24" style={{...s,width:16,height:16}}><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>,
    bounce:   <svg viewBox="0 0 24 24" style={{...s,width:16,height:16}}><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>,
  };
  return icons[name] || null;
};

const LogoMark = () => (
  <svg className="logo-mark" viewBox="0 0 32 32" fill="none" aria-label="MizDash">
    <rect width="32" height="32" rx="8" fill="var(--primary)"/>
    <path d="M7 22V10l5 6 4-8 4 8 5-6v12" stroke="white" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>
    <circle cx="16" cy="16" r="2" fill="white"/>
  </svg>
);

const LineChart = ({ theme }) => {
  const ref = useRef(null);
  const chartRef = useRef(null);
  useEffect(() => {
    if (chartRef.current) { chartRef.current.destroy(); chartRef.current = null; }
    const isDark = theme === 'dark';
    const grid = isDark ? 'rgba(255,255,255,0.06)' : 'rgba(0,0,0,0.06)';
    const tc = isDark ? '#888896' : '#7a7974';
    chartRef.current = new Chart(ref.current, {
      type:'line',
      data:{
        labels:CHART_MONTHS,
        datasets:[
          {label:'Sessions',data:SESSIONS_DATA,borderColor:'#4f98a3',backgroundColor:'rgba(79,152,163,0.08)',tension:0.4,fill:true,pointRadius:0,pointHoverRadius:5,borderWidth:2,yAxisID:'y'},
          {label:'Revenue',data:REVENUE_DATA,borderColor:'#6daa45',backgroundColor:'rgba(109,170,69,0.08)',tension:0.4,fill:true,pointRadius:0,pointHoverRadius:5,borderWidth:2,yAxisID:'y1'},
        ]
      },
      options:{
        responsive:true,maintainAspectRatio:false,interaction:{mode:'index',intersect:false},
        plugins:{legend:{display:true,position:'top',align:'end',labels:{usePointStyle:true,pointStyle:'circle',padding:16,color:tc,font:{family:'Inter',size:12}}},tooltip:{backgroundColor:isDark?'#1c1c22':'#fff',titleColor:isDark?'#e8e8f0':'#28251d',bodyColor:tc,borderColor:isDark?'#2a2a33':'#dcd9d5',borderWidth:1,padding:10}},
        scales:{
          x:{grid:{color:grid},ticks:{color:tc,font:{family:'Inter',size:11}},border:{display:false}},
          y:{position:'left',grid:{color:grid},ticks:{color:tc,font:{family:'Inter',size:11},callback:v=>v>=1000?`${(v/1000).toFixed(0)}k`:v},border:{display:false}},
          y1:{position:'right',grid:{drawOnChartArea:false},ticks:{color:tc,font:{family:'Inter',size:11},callback:v=>`$${v>=1000?`${(v/1000).toFixed(0)}k`:v}`},border:{display:false}}
        }
      }
    });
    return () => { if(chartRef.current){chartRef.current.destroy();chartRef.current=null;} };
  }, [theme]);
  return <canvas ref={ref}/>;
};

const DonutChart = ({ theme }) => {
  const ref = useRef(null);
  const chartRef = useRef(null);
  useEffect(() => {
    if (chartRef.current) { chartRef.current.destroy(); chartRef.current=null; }
    const isDark = theme === 'dark';
    chartRef.current = new Chart(ref.current, {
      type:'doughnut',
      data:{labels:TRAFFIC_SOURCES.map(s=>s.label),datasets:[{data:TRAFFIC_SOURCES.map(s=>s.value),backgroundColor:TRAFFIC_SOURCES.map(s=>s.color),borderWidth:0,hoverOffset:6}]},
      options:{responsive:true,maintainAspectRatio:false,cutout:'70%',plugins:{legend:{display:false},tooltip:{backgroundColor:isDark?'#1c1c22':'#fff',titleColor:isDark?'#e8e8f0':'#28251d',bodyColor:isDark?'#888896':'#7a7974',borderColor:isDark?'#2a2a33':'#dcd9d5',borderWidth:1,callbacks:{label:c=>` ${c.label}: ${c.raw}%`}}}}
    });
    return () => { if(chartRef.current){chartRef.current.destroy();chartRef.current=null;} };
  }, [theme]);
  return <canvas ref={ref}/>;
};

const Pill = ({s}) => {
  const map = {paid:['pill-success','✓ Paid'],trial:['pill-warning','⏳ Trial'],free:['pill-info','Free']};
  const [cls,label] = map[s]||['pill-info',s];
  return <span className={`status-pill ${cls}`}>{label}</span>;
};

const App = () => {
  const [theme, setTheme] = useState('dark');
  const [activeNav, setActiveNav] = useState('dashboard');
  const [dateRange, setDateRange] = useState('30d');
  useEffect(() => { document.documentElement.setAttribute('data-theme', theme); }, [theme]);

  return (
    <div className="app">
      <aside className="sidebar">

          <div key={n.id} className={`nav-item${activeNav===n.id?' active':''}`} onClick={()=>setActiveNav(n.id)} role="button" tabIndex={0} onKeyDown={e=>e.key==='Enter'&&setActiveNav(n.id)}>

        <div className={`nav-item${activeNav==='settings'?' active':''}`} onClick={()=>setActiveNav('settings')} role="button" tabIndex={0}><Icon name="settings" size={16}/>Settings</div>
        <div className="sidebar-bottom">
          <div className="nav-item" style={{gap:'0.6rem'}}>
            <div className="avatar" style={{width:26,height:26,fontSize:'0.65rem'}}>MC</div>
            <div style={{flex:1,minWidth:0}}>
              <div style={{fontSize:'0.82rem',fontWeight:600,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>Mirza Causevic</div>
              <div style={{fontSize:'0.72rem',color:'var(--faint)'}}>Director of Tech</div>
            </div>
          </div>
        </div>
      </aside>

      <header className="header">
        <div className="header-left">
          <div className="mobile-logo"><LogoMark/><span style={{fontFamily:"'Space Grotesk',sans-serif",fontWeight:700}}>Miz<span style={{color:'var(--primary)'}}>Dash</span></span></div>
          <div className="search-bar"><Icon name="search" size={14}/><input type="text" placeholder="Search..." aria-label="Search"/></div>
        </div>
        <div className="header-right">
          <div className="tooltip-wrap">
            <button className="icon-btn badge" aria-label="Notifications"><Icon name="bell" size={16}/></button>
            <span className="tooltip">3 new alerts</span>
          </div>
          <div className="tooltip-wrap">
            <button className="icon-btn" onClick={()=>setTheme(t=>t==='dark'?'light':'dark')} aria-label="Toggle theme">
              {theme==='dark'?<Icon name="sun" size={16}/>:<Icon name="moon" size={16}/>}
            </button>
            <span className="tooltip">{theme==='dark'?'Light mode':'Dark mode'}</span>
          </div>
          <div className="tooltip-wrap"><div className="avatar">MC</div><span className="tooltip">Mirza Causevic</span></div>
        </div>
      </header>

      <main className="main">
        <div className="page-header">
          <div>
            <h1 className="page-title">Analytics Overview</h1>
            <p className="page-subtitle">Welcome back, Mirza. Here's what's happening today.</p>
          </div>
          <div style={{display:'flex',gap:'0.5rem',alignItems:'center',flexWrap:'wrap'}}>
            <div className="date-tabs">
              {['7d','30d','90d','1y'].map(d=>(
                <button key={d} className={`date-tab${dateRange===d?' active':''}`} onClick={()=>setDateRange(d)}>{d}</button>
              ))}
            </div>
            <button className="btn btn-primary"><Icon name="download" size={14}/>Export</button>
          </div>
        </div>

        <div className="kpi-grid">
          {KPI_DATA.map((k,i)=>(
            <div className="kpi-card" key={i}>
              <div className="kpi-header">
                <span className="kpi-label">{k.label}</span>
                <div className="kpi-icon" style={{background:k.bg,color:k.color}}><Icon name={k.icon} size={16}/></div>
              </div>
              <div className="kpi-value">{k.value}</div>
              <div className="kpi-footer">
                <span className={`trend ${k.up?'up':'down'}`}><Icon name={k.up?'up':'dn'} size={12}/>{k.change}{k.suffix}</span>
                <span className="trend-label">vs last month</span>
              </div>

        </div>

        <div className="charts-grid">
          <div className="card">
            <div className="card-header"><div><div className="card-title">Sessions & Revenue</div><div className="card-subtitle">12-month performance</div></div></div>

          </div>
          <div className="card">
            <div className="card-header"><div><div className="card-title">Traffic Sources</div><div className="card-subtitle">Last 30 days</div></div></div>
            <div className="chart-wrap" style={{height:'160px'}}><DonutChart theme={theme}/></div>
            <div className="donut-legend">
              {TRAFFIC_SOURCES.map((s,i)=>(
                <div className="legend-item" key={i}>

            <button className="btn btn-ghost">View all</button>
          </div>
          <div className="table-wrap">
            <table>
              <thead><tr><th>User</th><th>Last Page</th><th>Sessions</th><th>Revenue</th><th>Status</th></tr></thead>
              <tbody>
                {USERS.map((u,i)=>(
                  <tr key={i}>

            <div className="activity-list">
              {ACTIVITY.map((a,i)=>(
                <div className="activity-item" key={i}>
                  <div className="activity-icon" style={{background:a.bg}}>{a.icon}</div>

                    <div className="activity-text">{a.text}</div>

          </div>
          <div className="card">
            <div className="card-header"><div><div className="card-title">Top Pages</div><div className="card-subtitle">By unique visits</div></div></div>

          </div>
        </div>
      </main>
    </div>
  );
};

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App/>);
</script>
</body>
</html>
